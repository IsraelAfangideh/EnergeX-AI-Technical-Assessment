services:
  mysql:
    image: mysql:8.0.23
    platform: linux/amd64
    container_name: lumen_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: localhost
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "7171:3306"
    volumes:
      - mysql_data:/var/lib/mysql
  redis:
    image: redis:7
    platform: linux/amd64
    container_name: lumen_redis
    restart: always
    ports:
      - "6379:6379"
volumes:
  mysql_data: