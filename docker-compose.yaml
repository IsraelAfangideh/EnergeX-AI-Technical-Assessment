services:
  mysql:
    image: mysql:8.0.23
    platform: linux/amd64
    container_name: lumen_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "${MYSQL_HOST_PORT:-7171}:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    platform: linux/amd64
    container_name: lumen_redis
    restart: always
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"

  lumen:
    build: ./lumen-api
    container_name: lumen_app
    restart: always
    depends_on:
      - mysql
      - redis
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_NAME}
      DB_USERNAME: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_CACHE_URL: http://node:${NODE_PORT:-3000}
    ports:
      - "${LUMEN_PORT:-8000}:8000"

  node:
    build:
      context: ./express-api
      dockerfile: Dockerfile
    container_name: node_cache
    restart: always
    depends_on:
      - mysql
      - redis
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "${NODE_PORT:-3000}:3000"


  frontend:
    build: ./vue-frontend
    container_name: vue_frontend
    restart: always
    depends_on:
      - lumen
      - node
    ports:
      - "5173:5173"

volumes:
  mysql_data: