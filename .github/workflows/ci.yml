name: Full-Stack CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  # Shared defaults for both jobs (can be overridden per-job)
  MYSQL_ROOT_PASSWORD: root
  MYSQL_DATABASE: test_db
  DB_USER: root
  DB_PASSWORD: root
  DB_HOST: 127.0.0.1
  DB_PORT: 3306
  REDIS_HOST: 127.0.0.1
  REDIS_PORT: 6379
  NODE_CACHE_URL: http://127.0.0.1:3000/

jobs:
  node-tests:
    name: Node (Jest) tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: ${{ env.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ env.MYSQL_DATABASE }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12
      redis:
        image: redis:6
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping || exit 1"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Node deps (express-api)
        working-directory: ./express-api
        run: npm ci

      - name: Wait for MySQL and Redis to be ready
        run: |
          # short loop: fail early if services never appear
          for i in {1..30}; do
            nc -z 127.0.0.1 3306 && nc -z 127.0.0.1 6379 && echo "services up" && break
            echo "waiting for services..."
            sleep 2
          done

      - name: Run Node tests (Jest)
        working-directory: ./express-api
        env:
          DB_HOST: ${{ env.DB_HOST }}
          DB_USER: ${{ env.DB_USER }}
          DB_PASSWORD: ${{ env.DB_PASSWORD }}
          DB_NAME: ${{ env.MYSQL_DATABASE }}
          REDIS_HOST: ${{ env.REDIS_HOST }}
          REDIS_PORT: ${{ env.REDIS_PORT }}
          NODE_ENV: test
        run: npx jest --runInBand --verbose

      # Optional: build images
      # - name: Build Docker images (optional)
      #   run: docker-compose -f docker-compose.yml build

  php-tests:
    name: Lumen (PHPUnit) tests
    runs-on: ubuntu-latest
    needs: node-tests   # optional: run node tests first; remove if parallel desired
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: ${{ env.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ env.MYSQL_DATABASE }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12
      redis:
        image: redis:6
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping || exit 1"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12

    env:
      APP_ENV: testing
      DB_CONNECTION: mysql
      DB_HOST: ${{ env.DB_HOST }}
      DB_PORT: ${{ env.DB_PORT }}
      DB_DATABASE: ${{ env.MYSQL_DATABASE }}
      DB_USERNAME: ${{ env.DB_USER }}
      DB_PASSWORD: ${{ env.DB_PASSWORD }}
      REDIS_HOST: ${{ env.REDIS_HOST }}
      REDIS_PORT: ${{ env.REDIS_PORT }}
      NODE_CACHE_URL: ${{ env.NODE_CACHE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------
      # Start Node cache service so Lumen can call it
      # -------------------------
      - name: Setup Node for cache service
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install express-api deps and start cache server
        working-directory: ./express-api
        run: |
          npm ci
          # spawn the TypeScript server using ts-node (background)
          # redirect outputs so job logs remain readable
          npx ts-node src/server.ts > node-server.log 2>&1 &
          echo "started node cache service (background)"
      - name: Wait for Node cache service
        run: |
          for i in {1..30}; do
            if curl -sSf http://127.0.0.1:3000/cache/posts >/dev/null 2>&1; then
              echo "node-cache up"
              break
            fi
            echo "waiting for node cache..."
            sleep 1
          done

      # -------------------------
      # Setup PHP
      # -------------------------
      - name: Setup PHP 8.x
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, pdo_mysql
          tools: composer:v2

      - name: Composer install (lumen-api)
        working-directory: ./lumen-api
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Create .env for Lumen (test config)
        working-directory: ./lumen-api
        run: |
          cat > .env <<'EOF'
          APP_NAME=Lumen
          APP_ENV=testing
          APP_KEY=base64:localtestkey
          APP_DEBUG=true
          DB_CONNECTION=mysql
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_DATABASE=${{ env.MYSQL_DATABASE }}
          DB_USERNAME=${{ env.DB_USER }}
          DB_PASSWORD=${{ env.DB_PASSWORD }}
          REDIS_HOST=127.0.0.1
          REDIS_PORT=6379
          NODE_CACHE_URL=${{ env.NODE_CACHE_URL }}
          EOF
          php -v

      - name: Run migrations
        working-directory: ./lumen-api
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: ${{ env.MYSQL_DATABASE }}
          DB_USERNAME: ${{ env.DB_USER }}
          DB_PASSWORD: ${{ env.DB_PASSWORD }}
        run: |
          php artisan migrate --force || echo "migrate may fail if migrations skipped"

      - name: Run PHPUnit
        working-directory: ./lumen-api
        env:
          APP_ENV: testing
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: ${{ env.MYSQL_DATABASE }}
          DB_USERNAME: ${{ env.DB_USER }}
          DB_PASSWORD: ${{ env.DB_PASSWORD }}
          NODE_CACHE_URL: http://127.0.0.1:3000/
        run: ./vendor/bin/phpunit --verbose --debug
