name: Full-Stack CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  MYSQL_ROOT_PASSWORD: root
  MYSQL_DATABASE: test_db
  DB_USERNAME: root
  DB_PASSWORD: root
  DB_HOST: 127.0.0.1
  DB_PORT: 3306
  REDIS_HOST: 127.0.0.1
  REDIS_PORT: 6379
  NODE_CACHE_URL: http://127.0.0.1:3000/

jobs:
  node-tests:
    name: Node (Jest) tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12
      redis:
        image: redis:6
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping || exit 1"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Node deps (express-api)
        working-directory: ./express-api
        run: npm ci

      - name: Wait for MySQL and Redis
        run: |
          for i in {1..30}; do
            nc -z 127.0.0.1 3306 && nc -z 127.0.0.1 6379 && echo "services up" && break
            echo "waiting for services..."
            sleep 2
          done
      - name: Clear Jest Cache
        working-directory: ./express-api
        run: npx jest --clearCache
      - name: Run Node tests (Jest)
        working-directory: ./express-api
        env:
          NODE_ENV: test
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASSWORD: root
          DB_NAME: test_db
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
        run: npx jest --runInBand --verbose

  php-tests:
    name: Lumen (PHPUnit) tests
    runs-on: ubuntu-latest
    needs: node-tests
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12
      redis:
        image: redis:6
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping || exit 1"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12

    env:
      APP_ENV: testing
      APP_KEY: ${{ secrets.APP_KEY }}
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: test_db
      DB_USERNAME: root
      DB_PASSWORD: root
      CACHE_DRIVER: array
      QUEUE_CONNECTION: sync

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Node cache server
      - name: Setup Node for cache service
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and start Node cache server (background)
        working-directory: ./express-api
        run: |
          npm ci
          nohup npx ts-node src/server.ts > node-server.log 2>&1 &

      - name: Wait for node cache
        run: |
          for i in {1..30}; do
            if curl -sSf http://127.0.0.1:3000/cache/posts >/dev/null 2>&1; then
              echo "node-cache up"
              break
            fi
            echo "waiting for node cache..."
            sleep 1
          done

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, pdo_mysql
          tools: composer:v2

      - name: Composer install (lumen-api)
        working-directory: ./lumen-api
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Create .env for Lumen (MySQL)
        working-directory: ./lumen-api
        run: |
          cat <<EOF > .env
          APP_KEY=${{ secrets.APP_KEY }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          APP_ENV=testing
          DB_CONNECTION=mysql
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_DATABASE=test_db
          DB_USERNAME=root
          DB_PASSWORD=root
          CACHE_DRIVER=array
          QUEUE_CONNECTION=sync
          EOF

      - name: Run migrations
        working-directory: ./lumen-api
        run: php artisan migrate:fresh --seed --force

      - name: Run PHPUnit
        working-directory: ./lumen-api
        env:
          NODE_CACHE_URL: http://127.0.0.1:3000/
        run: ./vendor/bin/phpunit --debug
